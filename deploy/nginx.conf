events {}

http {
    # Use Docker's embedded DNS so `app` re-resolves to all scaled replicas.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        location / {
            set $upstream app:8080;
            proxy_pass http://$upstream;
            proxy_set_header Host $host;

            # Critical for sutegi SSE / streaming: don't buffer the response,
            # so streamed frames reach the client as they're produced.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1h;
        }
    }
}
