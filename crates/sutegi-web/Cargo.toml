[package]
name = "sutegi-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Router, App builder, middleware, extractors, and runtime introspection for sutegi."

[dependencies]
sutegi-http = { path = "../sutegi-http", version = "0.1.0" }
sutegi-json = { path = "../sutegi-json", version = "0.1.0" }
# Only pulled in by the `graceful` feature, for SIGTERM/SIGINT handling.
libc = { version = "0.2", optional = true }

[features]
# Install OS signal handlers (SIGTERM/SIGINT) for graceful shutdown in pods.
graceful = ["dep:libc"]
