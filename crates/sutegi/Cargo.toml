[package]
name = "sutegi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "sutegi — a zero-dependency, agent-native web framework for Rust. The forge."

[dependencies]
sutegi-json = { path = "../sutegi-json" }
sutegi-http = { path = "../sutegi-http" }
sutegi-web = { path = "../sutegi-web" }
sutegi-orm = { path = "../sutegi-orm" }
sutegi-validate = { path = "../sutegi-validate" }
sutegi-queue = { path = "../sutegi-queue" }
sutegi-ai = { path = "../sutegi-ai" }
sutegi-macros = { path = "../sutegi-macros", optional = true }

[features]
default = ["derive"]
# `#[derive(Model)]`. The macro's build-time deps (syn/quote) never reach your
# binary; disable with `default-features = false` if you want to skip them.
derive = ["dep:sutegi-macros"]
# Opt in to the runnable, bundled SQLite execution layer in sutegi-orm.
sqlite = ["sutegi-orm/sqlite"]
