[package]
name = "http-load-example"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "HTTP/1.1 keep-alive stress harness: drive a sutegi server with configurable concurrency and measure throughput + tail latency."
