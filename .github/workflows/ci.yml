name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    # A real PostgreSQL so the pure-std driver's live tests (SCRAM auth, the
    # query builder over PG, the durable queue) actually run in CI. The tests
    # skip themselves when SUTEGI_PG_TEST_URL is unset, so this is the only
    # thing that exercises them.
    services:
      postgres:
        # pgvector image = stock Postgres 16 + the pgvector extension, so the
        # embedding-column tests (vector(dim), pgvector distance operators) run
        # in CI alongside the plain jsonb / query-builder / durable-queue tests.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sutegi
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: sutegi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test (all features)
        run: cargo test --all-features
        env:
          SUTEGI_PG_TEST_URL: postgres://sutegi:secret@localhost:5432/sutegi_test

      # Required adversarial/fuzz gate. These `tests/fuzz.rs` targets exercise
      # the hand-rolled parsers, codecs, and crypto against garbage and
      # injection input. Naming them explicitly means deleting one is a hard CI
      # failure (`error: no test target named 'fuzz'`) rather than a silent drop
      # in coverage — the harness can't rot away unnoticed.
      - name: Adversarial / fuzz suite (must exist and pass)
        run: >-
          cargo test --all-features --test fuzz
          -p sutegi-json
          -p sutegi-http
          -p sutegi-crypto
          -p sutegi-template
          -p sutegi-mail
          -p sutegi-storage
          -p sutegi-session

      # Differential oracle: sutegi's hand-rolled JSON parser vs serde_json,
      # in an excluded workspace so the reference dep never enters the shipped
      # tree. Proves cross-parser agreement, not just no-panic. (The nightly
      # cargo-fuzz targets under fuzz/ are for a dedicated long-running job, not
      # this gate.)
      - name: Differential oracle (vs serde_json)
        run: cd differential && cargo test

      - name: Build (zero-dep core, no default features)
        run: cargo build --no-default-features

  # Statistical perf gate: run the aatxe bench suite on HEAD and on the base
  # ref, on the same runner, and fail (exit 2) when any bench regresses past
  # the noise gate. PRs only — a single-sided run on a shared runner has no
  # trustworthy baseline to compare against, so pushes just publish the report.
  bench:
    name: aatxe perf gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # benches/Cargo.toml path-depends on the sibling ../aatxe checkout, so
      # both repos land side by side under the workspace.
      - uses: actions/checkout@v4
        with:
          path: sutegi
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: enekos/aatxe
          path: aatxe

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sutegi/benches

      - name: Install aatxe CLI
        # The installer is a bash script (pipefail); dash chokes on it.
        run: |
          curl -fsSL https://raw.githubusercontent.com/enekos/aatxe/master/scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bench HEAD
        run: cd sutegi && make -s bench > /tmp/head.json

      - name: Bench base
        if: github.event_name == 'pull_request'
        run: |
          cd sutegi
          git checkout "origin/${{ github.base_ref }}"
          make -s bench > /tmp/base.json

      - name: Compare (fail on regression)
        if: github.event_name == 'pull_request'
        run: |
          set +e
          aatxe compare --base /tmp/base.json --head /tmp/head.json \
            --out /tmp/compare.json --markdown /tmp/compare.md \
            --threshold 0.10 --fail-on-regression
          status=$?
          cat /tmp/compare.md >> "$GITHUB_STEP_SUMMARY"
          exit $status

      - name: Publish report (push)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: aatxe-runreport
          path: /tmp/head.json
